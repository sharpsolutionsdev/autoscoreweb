name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:   # allows manual trigger from GitHub website

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git zip unzip openjdk-17-jdk \
            libffi-dev libssl-dev autoconf libtool pkg-config \
            zlib1g-dev libncurses5-dev cmake build-essential

      - name: Install Buildozer + Cython
        run: |
          pip install --upgrade pip
          pip install buildozer cython

      - name: Download Vosk Android wheel
        run: |
          wget -q https://github.com/alphacep/vosk-api/releases/download/v0.3.45/vosk-0.3.45-cp311-cp311-linux_aarch64.whl
          # Patch buildozer.spec to use the local wheel file
          sed -i 's|vosk,numpy,stripe|./vosk-0.3.45-cp311-cp311-linux_aarch64.whl,numpy,stripe|' buildozer.spec

      - name: Accept Android SDK licenses
        run: |
          mkdir -p ~/.android
          echo "count=0" > ~/.android/repositories.cfg

      - name: Build debug APK
        run: |
          buildozer android debug
        env:
          SUPABASE_URL: https://poyjykgqsvgimssbhsuz.supabase.co
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          DV_BILLING_URL: ${{ secrets.DV_BILLING_URL }}

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: DartVoice-Android-Debug
          path: bin/*.apk
          retention-days: 30
