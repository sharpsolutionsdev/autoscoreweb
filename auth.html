<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Login | OcheRaffles</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: { 
                extend: { 
                    colors: { brand: '#dc2626', dark: '#080c16', card: '#131c2f' },
                    animation: { 'bounce-slow': 'bounce 3s infinite' }
                } 
            }
        }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="app.js"></script>
</head>
<body class="bg-dark text-slate-300 font-sans antialiased min-h-screen flex flex-col items-center justify-center p-4 relative overflow-hidden">

    <!-- Background Glow -->
    <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[400px] h-[400px] bg-brand/10 blur-[120px] rounded-full pointer-events-none"></div>

    <div class="w-full max-w-md bg-card/50 backdrop-blur-xl border border-white/5 rounded-[2.5rem] p-10 shadow-2xl relative z-10">
        
        <!-- STEP 1: ENTER EMAIL -->
        <div id="step-1" class="transition-all duration-500">
            <div class="text-center mb-10">
                <div class="w-16 h-16 bg-gradient-to-br from-brand to-red-800 rounded-2xl flex items-center justify-center font-black text-white text-3xl mx-auto mb-6 shadow-xl shadow-brand/20">OR</div>
                <h2 class="text-4xl font-black text-white mb-2 tracking-tighter">Welcome Back</h2>
                <p class="text-sm text-slate-400 font-medium">Enter your email for a secure magic link.</p>
            </div>
            
            <form class="space-y-6" onsubmit="sendMagicLink(event)">
                <div class="space-y-2">
                    <label class="block text-[10px] font-black text-slate-500 uppercase tracking-[0.2em] ml-1">Secure Email Gateway</label>
                    <input type="email" id="email-input" required placeholder="dartsfan@example.com" 
                           class="w-full bg-dark border border-white/5 rounded-2xl px-6 py-5 text-white focus:border-brand focus:outline-none focus:ring-4 focus:ring-brand/5 transition-all text-lg font-medium">
                </div>
                <button type="submit" id="btn-send" class="w-full bg-white hover:bg-slate-200 text-dark font-black py-5 rounded-2xl transition-all shadow-xl hover:shadow-white/10 active:scale-[0.98] text-lg tracking-tight">
                    Send Magic Link
                </button>
            </form>
            <p class="text-center text-xs text-slate-600 mt-10 font-bold uppercase tracking-widest group">
                <a href="index.html" class="hover:text-white transition-colors">&larr; Return to OcheRaffles</a>
            </p>
        </div>

        <!-- STEP 2: CHECK INBOX -->
        <div id="step-2" class="hidden transition-all duration-500 animate-in fade-in slide-in-from-bottom-4">
            <div class="text-center py-10">
                <div class="w-20 h-20 bg-emerald-500/10 text-emerald-500 rounded-full flex items-center justify-center mx-auto mb-8 border border-emerald-500/20 shadow-[0_0_30px_rgba(16,185,129,0.15)]">
                    <svg class="w-10 h-10 animate-bounce-slow" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
                    </svg>
                </div>
                <h2 class="text-3xl font-black text-white mb-3 tracking-tighter">Check Your Inbox</h2>
                <p class="text-slate-400 font-medium leading-relaxed mb-8">
                    We've sent a secure magic link to <br>
                    <span id="display-email" class="text-white font-bold underline decoration-brand/50"></span>
                </p>
                
                <div class="bg-dark/50 p-6 rounded-2xl border border-white/5 mb-8">
                    <p class="text-[10px] text-slate-500 font-black uppercase tracking-widest mb-1">Status</p>
                    <p class="text-sm text-emerald-400 font-bold flex items-center justify-center gap-2">
                        <span class="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></span> Awaiting Link Click...
                    </p>
                </div>

                <button onclick="location.reload()" class="text-xs text-slate-500 hover:text-white font-bold uppercase tracking-widest transition-colors">
                    Back to login
                </button>
            </div>
        </div>

    </div>

    <script>
        async function sendMagicLink(e) {
            e.preventDefault();
            const email = document.getElementById('email-input').value;
            const btn = document.getElementById('btn-send');
            
            btn.disabled = true;
            btn.innerText = "Securing Connection...";

            // Supabase Magic Link call
            const { error } = await window.supabaseClient.auth.signInWithOtp({ 
                email: email,
                options: {
                    emailRedirectTo: window.location.origin + '/index.html'
                }
            });

            if (error) {
                alert(error.message);
                btn.disabled = false;
                btn.innerText = "Send Magic Link";
            } else {
                document.getElementById('display-email').innerText = email;
                document.getElementById('step-1').classList.add('hidden');
                document.getElementById('step-2').classList.remove('hidden');
            }
        }
    </script>
</body>
</html>
