<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <title>Payment Successful | OcheVault</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config={theme:{extend:{colors:{brand:'#dc2626',dark:'#0c1220',success:'#10b981'}}}}
    </script>
    <style>
        body{font-family:'Plus Jakarta Sans',sans-serif;}
        @keyframes checkPop{0%{transform:scale(0);opacity:0}60%{transform:scale(1.2)}100%{transform:scale(1);opacity:1}}
        .check-pop{animation:checkPop 0.5s cubic-bezier(0.34,1.56,0.64,1) 0.2s both;}
    </style>
</head>
<body class="bg-dark text-white min-h-screen flex items-center justify-center p-6">
    <div class="text-center max-w-xs">
        <div class="w-20 h-20 mx-auto mb-6 rounded-full bg-success/15 border-2 border-success/30 flex items-center justify-center check-pop">
            <svg class="w-10 h-10 text-success" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z" clip-rule="evenodd"/></svg>
        </div>
        <h1 class="text-2xl font-black text-white mb-2" style="font-family:'Barlow Condensed',sans-serif;">Payment Successful!</h1>
        <p class="text-slate-400 text-sm mb-6">Your tickets have been credited. This window will close automatically.</p>
        <p class="text-slate-600 text-xs">If it doesn't close, you can safely close it yourself.</p>
    </div>
    <script>
        // Auto-close after a short delay — parent window is polling and will detect
        setTimeout(()=>{ try{window.close();}catch(e){} }, 2500);
    </script>
</body>
</html>
