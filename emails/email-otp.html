<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Your DartVoice Code</title>
    <style>
        body { margin: 0; padding: 0; background-color: #050505; font-family: 'Rubik', -apple-system, sans-serif; }
        .wrapper { width: 100%; max-width: 500px; margin: 60px auto; background-color: #0A0A0C; border: 1px solid #1A1A20; border-radius: 32px; overflow: hidden; box-shadow: 0 40px 100px rgba(0,0,0,0.8); }
        .hero { padding: 40px; text-align: center; border-bottom: 1px solid #1A1A20; }
        h1 { color: #F0F0F5; font-size: 24px; margin: 0 0 12px; font-weight: 700; }
        p { color: #6E6E82; font-size: 15px; line-height: 1.6; margin: 0; }
        .code-container { padding: 40px; text-align: center; background: radial-gradient(circle at center, #1A0608 0%, #0A0A0C 100%); }
        .code { display: inline-block; padding: 20px 40px; background: #111114; border: 1px solid #CC0B20; border-radius: 20px; color: #F0F0F5; font-family: 'Rubik', sans-serif; font-size: 48px; font-weight: 800; letter-spacing: 8px; box-shadow: 0 0 40px rgba(204,11,32,0.15); }
        .timer { margin-top: 24px; color: #CC0B20; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 2px; }
        .footer { padding: 32px; background: #08080A; text-align: center; }
        .footer-text { font-size: 11px; color: #4A4A5A; }
    </style>
</head>
<body>
    <div class="wrapper">
        <div style="height: 3px; background: #CC0B20;"></div>
        <div class="hero">
            <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#CC0B20" stroke-width="2" style="margin-bottom:16px;">
                <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
            </svg>
            <h1>Your Login Code</h1>
            <p>Enter the code below to sign in to your DartVoice account. This code expires in 10 minutes.</p>
        </div>

        <div class="code-container">
            <div class="code">{{ .Token }}</div>
            <div class="timer">EXPIRES IN 10 MINUTES</div>
        </div>

        <div class="footer">
            <p class="footer-text">
                If you didn't request this code, you can safely ignore this email.<br>
                &copy; 2026 DartVoice &bull; Built for the oche.
            </p>
        </div>
    </div>
</body>
</html>
