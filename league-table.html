<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <title>League Table | OcheVault</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:ital,wght@0,700;0,900;1,700&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config={theme:{extend:{fontFamily:{display:['"Barlow Condensed"','sans-serif'],sans:['"Plus Jakarta Sans"','sans-serif']},colors:{brand:'#dc2626',dark:'#0c1220',card:'#141f35',accent:'#f59e0b',success:'#10b981'}}}}
    </script>

    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .display { font-family: 'Barlow Condensed', sans-serif; font-weight: 900; font-style: italic; letter-spacing: -0.02em; }
        .oche-bg { background-image: repeating-conic-gradient(from 0deg, rgba(220,38,38,0.025) 0deg 18deg, rgba(255,255,255,0.008) 18deg 36deg); }

        @keyframes floatUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes pulse-glow { 0%,100% { box-shadow: 0 0 12px rgba(220,38,38,0.2); } 50% { box-shadow: 0 0 24px rgba(220,38,38,0.4); } }

        .mobile-menu { transform: translateY(-100%); transition: transform 0.3s cubic-bezier(0.22,1,0.36,1), opacity 0.3s; opacity: 0; pointer-events: none; }
        .mobile-menu.open { transform: translateY(0); opacity: 1; pointer-events: auto; }

        /* League Table styles */
        .lt-table { width: 100%; border-collapse: separate; border-spacing: 0 4px; }
        .lt-table thead th { font-size: 0.68rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: #475569; padding: 0 12px 8px; }
        .lt-table thead th:first-child { padding-left: 16px; }
        .lt-row { background: rgba(20,31,53,0.45); transition: all 0.2s; }
        .lt-row:nth-child(even) { background: rgba(20,31,53,0.25); }
        .lt-row:hover { background: rgba(20,31,53,0.75); transform: translateX(4px); }
        .lt-row.you-row { background: rgba(220,38,38,0.07) !important; border-left: 3px solid #dc2626; }
        .lt-row.you-row:hover { background: rgba(220,38,38,0.12) !important; }
        .lt-row td { padding: 13px 12px; }
        .lt-row td:first-child { padding-left: 16px; border-radius: 14px 0 0 14px; }
        .lt-row td:last-child { border-radius: 0 14px 14px 0; }

        .pos-badge { width: 32px; height: 32px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-family: 'Barlow Condensed', sans-serif; font-weight: 900; font-size: 1rem; flex-shrink: 0; }
        .pos-gold { background: linear-gradient(135deg, #f59e0b, #d97706); color: #0c1220; box-shadow: 0 4px 12px rgba(245,158,11,0.3); }
        .pos-silver { background: linear-gradient(135deg, #94a3b8, #64748b); color: #0c1220; }
        .pos-bronze { background: linear-gradient(135deg, #cd7f32, #a0522d); color: #0c1220; }
        .pos-default { background: rgba(30,41,59,0.8); color: #64748b; }

        .rank-1-row { border-color: rgba(245,158,11,0.2) !important; box-shadow: 0 0 24px rgba(245,158,11,0.05); }
        .rank-2-row { border-color: rgba(148,163,184,0.12) !important; }
        .rank-3-row { border-color: rgba(205,127,50,0.12) !important; }

        /* Tooltip */
        .tooltip-wrap { position: relative; }
        .tooltip-wrap .tooltip { position: absolute; bottom: 130%; left: 50%; transform: translateX(-50%); background: #0c1220; border: 1px solid rgba(255,255,255,0.1); border-radius: 10px; padding: 10px 14px; white-space: nowrap; font-size: 0.72rem; color: #94a3b8; pointer-events: none; opacity: 0; transition: opacity 0.2s; z-index: 99; }
        .tooltip-wrap:hover .tooltip { opacity: 1; }
        .tooltip-wrap .tooltip::after { content: ''; position: absolute; top: 100%; left: 50%; transform: translateX(-50%); border: 6px solid transparent; border-top-color: rgba(255,255,255,0.1); }

        /* Status pills */
        .pill { display: inline-flex; align-items: center; gap: 5px; font-size: 0.68rem; font-weight: 800; text-transform: uppercase; letter-spacing: 0.08em; padding: 4px 10px; border-radius: 20px; }
        .pill-filling { background: rgba(245,158,11,0.12); color: #f59e0b; border: 1px solid rgba(245,158,11,0.3); }
        .pill-active { background: rgba(16,185,129,0.12); color: #10b981; border: 1px solid rgba(16,185,129,0.3); }
        .pill-completed { background: rgba(148,163,184,0.1); color: #94a3b8; border: 1px solid rgba(148,163,184,0.2); }

        /* Tier badges */
        .tier-badge { display: inline-flex; align-items: center; font-size: 0.68rem; font-weight: 800; letter-spacing: 0.06em; padding: 3px 10px; border-radius: 6px; text-transform: uppercase; }
        .tier-bronze { background: rgba(205,127,50,0.15); color: #cd7f32; border: 1px solid rgba(205,127,50,0.3); }
        .tier-silver { background: rgba(148,163,184,0.12); color: #94a3b8; border: 1px solid rgba(148,163,184,0.25); }
        .tier-gold { background: rgba(245,158,11,0.12); color: #f59e0b; border: 1px solid rgba(245,158,11,0.3); }
        .tier-platinum { background: rgba(99,102,241,0.12); color: #818cf8; border: 1px solid rgba(99,102,241,0.3); }

        /* Progress bar */
        .progress-track { background: rgba(255,255,255,0.06); border-radius: 9999px; height: 8px; overflow: hidden; }
        .progress-fill { height: 100%; border-radius: 9999px; background: linear-gradient(90deg, #dc2626, #f59e0b); transition: width 1s cubic-bezier(0.22,1,0.36,1); }

        /* Info card */
        .info-card { background: rgba(20,31,53,0.6); border: 1px solid rgba(255,255,255,0.06); border-radius: 16px; padding: 18px 20px; }

        /* Prize box */
        .prize-box { background: rgba(245,158,11,0.05); border: 1px solid rgba(245,158,11,0.15); border-radius: 14px; padding: 16px 20px; }

        /* Bracket styles */
        .bracket-container { overflow-x: auto; padding-bottom: 16px; min-width: 0; }
        .bracket-rounds { display: flex; gap: 0; align-items: center; min-width: max-content; }
        .bracket-round { display: flex; flex-direction: column; gap: 0; }
        .round-label { font-size: 0.72rem; font-weight: 800; text-transform: uppercase; letter-spacing: 0.08em; color: #475569; text-align: center; margin-bottom: 16px; padding: 6px 16px; }

        .match-card { background: rgba(20,31,53,0.7); border: 1px solid rgba(255,255,255,0.07); border-radius: 12px; width: 210px; overflow: hidden; margin: 4px 0; transition: all 0.2s; }
        .match-card:hover { border-color: rgba(255,255,255,0.14); box-shadow: 0 4px 20px rgba(0,0,0,0.3); }

        .match-player { display: flex; align-items: center; gap: 8px; padding: 9px 12px; transition: background 0.15s; }
        .match-player:first-child { border-bottom: 1px solid rgba(255,255,255,0.05); }
        .match-player.winner { background: rgba(16,185,129,0.1); }
        .match-player.loser { opacity: 0.45; }
        .match-player-name { font-size: 0.8rem; font-weight: 600; color: #e2e8f0; flex: 1; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .match-score { font-family: 'Barlow Condensed', sans-serif; font-weight: 900; font-size: 1.05rem; color: #94a3b8; flex-shrink: 0; }
        .match-score.winner-score { color: #10b981; }

        /* Connector lines between rounds */
        .connector { width: 40px; display: flex; flex-direction: column; align-items: center; justify-content: center; flex-shrink: 0; }
        .connector-line { border-top: 1px solid rgba(255,255,255,0.1); width: 100%; }

        /* Match wrapper for vertical centering */
        .match-wrapper { display: flex; flex-direction: column; justify-content: center; }

        /* Waiting screen */
        .waiting-screen { text-align: center; padding: 60px 20px; }

        /* Player entry list */
        .player-entry { display: flex; align-items: center; gap: 10px; padding: 10px 16px; background: rgba(20,31,53,0.4); border: 1px solid rgba(255,255,255,0.05); border-radius: 12px; }

        /* Tournament winner banner */
        .winner-banner { background: linear-gradient(135deg, rgba(245,158,11,0.12), rgba(245,158,11,0.04)); border: 1px solid rgba(245,158,11,0.3); border-radius: 16px; padding: 20px; text-align: center; animation: pulse-glow 2s infinite; }
    </style>
</head>

    <script>
    (function () {
        // ── Helpers ──────────────────────────────────────────────────────────

        const params = new URLSearchParams(window.location.search);
        const pageId = parseInt(params.get('id'), 10);
        const pageType = params.get('type'); // 'tournament' or null
        const root = document.getElementById('page-root');

        let currentUserId = null;

        function tierClass(tier) {
            if (!tier) return 'tier-bronze';
            const t = tier.toLowerCase();
            if (t === 'gold') return 'tier-gold';
            if (t === 'silver') return 'tier-silver';
            if (t === 'platinum') return 'tier-platinum';
            return 'tier-bronze';
        }

        function statusPill(status) {
            if (!status) return '';
            const s = status.toLowerCase();
            if (s === 'filling') return `<span class="pill pill-filling"><span style="width:6px;height:6px;border-radius:50%;background:#f59e0b;display:inline-block;"></span>Filling</span>`;
            if (s === 'active') return `<span class="pill pill-active"><span style="width:6px;height:6px;border-radius:50%;background:#10b981;display:inline-block;animation:ping 1.5s cubic-bezier(0,0,0.2,1) infinite;"></span>Active</span>`;
            return `<span class="pill pill-completed">Completed</span>`;
        }

        function progressBar(joined, max) {
            const pct = max > 0 ? Math.min(100, Math.round((joined / max) * 100)) : 0;
            const left = max - joined;
            return `
                <div class="progress-track mb-2">
                    <div class="progress-fill" style="width:${pct}%"></div>
                </div>
                <div class="flex items-center justify-between text-[11px] text-slate-500 font-medium">
                    <span>${joined} / ${max} players</span>
                    <span>${left > 0 ? left + ' spot' + (left !== 1 ? 's' : '') + ' left' : 'Full'}</span>
                </div>`;
        }

        function avatarInitial(name, size = 36) {
            const initial = (name || '?').charAt(0).toUpperCase();
            return `<div style="width:${size}px;height:${size}px;border-radius:50%;background:rgba(220,38,38,0.18);border:1.5px solid rgba(220,38,38,0.35);display:flex;align-items:center;justify-content:center;font-size:${Math.round(size * 0.38)}px;font-weight:800;color:white;flex-shrink:0;">${initial}</div>`;
        }

        function displayName(profile) {
            if (!profile) return 'Unknown';
            if (profile.is_anonymous) return 'Anonymous';
            return profile.username || 'Anonymous';
        }

        function showError(msg) {
            root.innerHTML = `<div class="text-center py-20">
                <p class="text-slate-500 text-sm">${msg}</p>
                <a href="javascript:history.back()" class="inline-flex items-center gap-2 mt-6 text-brand text-sm font-semibold hover:underline">← Go back</a>
            </div>`;
        }

        // ── Entry point ───────────────────────────────────────────────────────

        async function init() {
            const { data: { user } } = await window.supabaseClient.auth.getUser();
            currentUserId = user ? user.id : null;

            if (!pageId) {
                showError('No ID provided. Add <code>?id=1</code> to the URL.');
                return;
            }

            if (pageType === 'tournament') {
                await loadTournament(pageId);
            } else {
                await loadLeague(pageId);
            }
        }

        // ────────────────────────────────────────────────────────────────────
        // LEAGUE TABLE MODE
        // ────────────────────────────────────────────────────────────────────

        async function loadLeague(leagueId) {
            const [{ data: league, error: leagueErr }, { data: entries, error: entriesErr }] = await Promise.all([
                window.supabaseClient.from('leagues').select('*').eq('id', leagueId).single(),
                window.supabaseClient
                    .from('league_entries')
                    .select('*, profiles(username, is_anonymous)')
                    .eq('league_id', leagueId)
                    .order('points', { ascending: false })
            ]);

            if (leagueErr || !league) {
                showError('League not found.');
                return;
            }

            const isFilling = (league.status || '').toLowerCase() === 'filling';
            const joined = league.players_joined || 0;
            const maxPlayers = league.max_players || 0;
            const prizePool = league.prize_pool || null;
            const season = league.season_number || league.season || null;

            document.title = `${league.name} | OcheVault`;

            // ── Header HTML ─────────────────────────────────────────────────
            let headerHtml = `
                <div style="animation:floatUp 0.45s cubic-bezier(0.22,1,0.36,1) both;">
                    <a href="javascript:history.back()" class="inline-flex items-center gap-2 text-slate-500 hover:text-white text-sm font-medium transition-colors mb-8 group">
                        <svg class="w-4 h-4 group-hover:-translate-x-0.5 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
                        Back to Leagues
                    </a>

                    <div class="flex flex-wrap items-center gap-3 mb-3">
                        <span class="tier-badge ${tierClass(league.tier)}">${league.tier || 'Bronze'}</span>
                        ${season ? `<span class="text-xs text-slate-500 font-semibold">Season ${season}</span>` : ''}
                        ${statusPill(league.status)}
                    </div>

                    <h1 class="display text-white text-4xl sm:text-5xl mb-2">${league.name}</h1>
                    ${league.description ? `<p class="text-slate-400 text-sm mb-6 max-w-xl">${league.description}</p>` : '<div class="mb-6"></div>'}

                    <div class="info-card mb-4">
                        <div class="flex items-center gap-2 mb-3">
                            <svg class="w-4 h-4 text-slate-500 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
                            <span class="text-xs text-slate-400 font-semibold uppercase tracking-wider">Player Progress</span>
                        </div>
                        ${progressBar(joined, maxPlayers)}
                    </div>

                    ${isFilling ? `
                    <div class="flex items-start gap-3 bg-accent/5 border border-accent/20 rounded-2xl px-5 py-4 mb-4">
                        <span class="text-lg flex-shrink-0">⏳</span>
                        <p class="text-sm text-slate-300">Waiting for players &mdash; league starts automatically when the minimum is reached.</p>
                    </div>` : ''}

                    ${prizePool ? `
                    <div class="prize-box mb-8 flex items-start gap-4">
                        <div class="w-10 h-10 rounded-xl bg-accent/10 border border-accent/25 flex items-center justify-center flex-shrink-0">
                            <svg class="w-5 h-5 text-accent" fill="currentColor" viewBox="0 0 20 20"><path d="M5 3a1 1 0 000 2h1.22l.305 1.222a5.995 5.995 0 003.472 8.342l-.305.834H9a1 1 0 000 2h2a1 1 0 000-2h-.197l.305-.834a5.994 5.994 0 003.472-8.342L14.78 5H16a1 1 0 100-2H5zM8 11a4 4 0 116.472-4.685A4 4 0 018 11z"/></svg>
                        </div>
                        <div>
                            <p class="text-xs text-slate-500 font-semibold uppercase tracking-wider mb-1">Prize Pool</p>
                            <p class="text-white font-bold text-base">${typeof prizePool === 'object' ? JSON.stringify(prizePool) : prizePool}</p>
                            <p class="text-[11px] text-slate-500 mt-0.5">Top 3 players share the prize</p>
                        </div>
                    </div>` : '<div class="mb-8"></div>'}
                </div>`;

            // ── Standings Table ──────────────────────────────────────────────
            let tableHtml = '';

            if (!entries || entries.length === 0) {
                tableHtml = `
                    <div class="info-card text-center py-14" style="animation:floatUp 0.5s 0.1s cubic-bezier(0.22,1,0.36,1) both;">
                        <svg class="w-12 h-12 text-slate-700 mx-auto mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0"/></svg>
                        <p class="text-slate-400 font-semibold mb-1">No players yet</p>
                        <p class="text-slate-600 text-sm">Be the first to join!</p>
                    </div>`;
            } else {
                const rows = entries.map((entry, i) => {
                    const pos = i + 1;
                    const name = displayName(entry.profiles);
                    const isYou = entry.user_id === currentUserId;

                    let posBadge = '';
                    let rowClass = 'lt-row';
                    if (pos === 1) {
                        posBadge = `<div class="pos-badge pos-gold" title="1st Place">
                            <svg style="width:16px;height:16px;" fill="currentColor" viewBox="0 0 20 20"><path d="M5 3a1 1 0 000 2h1.22l.305 1.222a5.995 5.995 0 003.472 8.342l-.305.834H9a1 1 0 000 2h2a1 1 0 000-2h-.197l.305-.834a5.994 5.994 0 003.472-8.342L14.78 5H16a1 1 0 100-2H5z"/></svg>
                        </div>`;
                        rowClass += ' rank-1-row';
                    } else if (pos === 2) {
                        posBadge = `<div class="pos-badge pos-silver">2</div>`;
                        rowClass += ' rank-2-row';
                    } else if (pos === 3) {
                        posBadge = `<div class="pos-badge pos-bronze">3</div>`;
                        rowClass += ' rank-3-row';
                    } else {
                        posBadge = `<div class="pos-badge pos-default">${pos}</div>`;
                    }
                    if (isYou) rowClass += ' you-row';

                    const played = (entry.wins || 0) + (entry.losses || 0);

                    return `<tr class="${rowClass}" style="animation:floatUp 0.3s ${0.05 + i * 0.04}s cubic-bezier(0.22,1,0.36,1) both;">
                        <td><div class="flex justify-center">${posBadge}</div></td>
                        <td>
                            <div class="flex items-center gap-3">
                                ${avatarInitial(name, 34)}
                                <div class="min-w-0">
                                    <span class="text-white text-sm font-bold truncate block max-w-[160px]">${name}</span>
                                    ${isYou ? '<span class="text-[9px] bg-brand/20 text-brand font-bold px-1.5 py-0.5 rounded-md uppercase tracking-wider">YOU</span>' : ''}
                                </div>
                            </div>
                        </td>
                        <td>
                            <div class="tooltip-wrap inline-block">
                                <span class="font-black text-white text-lg" style="font-family:'Barlow Condensed',sans-serif;">${entry.points || 0}</span>
                                <div class="tooltip">
                                    <div style="font-weight:700;color:white;margin-bottom:4px;">Points breakdown</div>
                                    <div>1pt per £1 spent on draws</div>
                                    <div>+ Triple Twenty bonus</div>
                                </div>
                            </div>
                        </td>
                        <td class="text-success font-bold text-sm">${entry.wins || 0}</td>
                        <td class="text-slate-500 font-medium text-sm">${entry.losses || 0}</td>
                        <td class="text-slate-400 font-medium text-sm">${played}</td>
                    </tr>`;
                }).join('');

                tableHtml = `
                    <div style="animation:floatUp 0.45s 0.08s cubic-bezier(0.22,1,0.36,1) both;">
                        <h2 class="display text-white text-2xl mb-4">Standings</h2>
                        <div class="info-card overflow-x-auto p-0" style="padding:0;">
                            <table class="lt-table">
                                <thead>
                                    <tr>
                                        <th class="text-center w-12">Pos</th>
                                        <th class="text-left">Player</th>
                                        <th class="text-left">
                                            <div class="tooltip-wrap inline-block">
                                                Pts
                                                <div class="tooltip">Hover a score for breakdown</div>
                                            </div>
                                        </th>
                                        <th class="text-left">W</th>
                                        <th class="text-left">L</th>
                                        <th class="text-left">Played</th>
                                    </tr>
                                </thead>
                                <tbody>${rows}</tbody>
                            </table>
                        </div>
                    </div>`;
            }

            // ── Points explanation card ──────────────────────────────────────
            const pointsCardHtml = `
                <div class="info-card mt-8" style="animation:floatUp 0.45s 0.15s cubic-bezier(0.22,1,0.36,1) both;">
                    <h3 class="display text-white text-xl mb-4">How Points Work</h3>
                    <div class="grid sm:grid-cols-2 gap-3">
                        <div class="flex items-start gap-3 bg-dark/40 rounded-xl p-4 border border-white/5">
                            <span class="text-xl flex-shrink-0">🎯</span>
                            <div>
                                <p class="text-white text-sm font-bold mb-0.5">Draw Entry</p>
                                <p class="text-slate-500 text-xs">1 point per £1 spent on draws</p>
                            </div>
                        </div>
                        <div class="flex items-start gap-3 bg-dark/40 rounded-xl p-4 border border-white/5">
                            <span class="text-xl flex-shrink-0">🎰</span>
                            <div>
                                <p class="text-white text-sm font-bold mb-0.5">Triple Twenty Bonus</p>
                                <p class="text-slate-500 text-xs">Bonus points = score ÷ 10 (rounded)</p>
                            </div>
                        </div>
                        <div class="flex items-start gap-3 bg-dark/40 rounded-xl p-4 border border-white/5">
                            <span class="text-xl flex-shrink-0">🏆</span>
                            <div>
                                <p class="text-white text-sm font-bold mb-0.5">Win a Draw</p>
                                <p class="text-slate-500 text-xs">+50 bonus points awarded</p>
                            </div>
                        </div>
                        <div class="flex items-start gap-3 bg-dark/40 rounded-xl p-4 border border-white/5">
                            <span class="text-xl flex-shrink-0">📅</span>
                            <div>
                                <p class="text-white text-sm font-bold mb-0.5">League Duration</p>
                                <p class="text-slate-500 text-xs">Runs for 4 weeks — top 3 win prizes</p>
                            </div>
                        </div>
                    </div>
                </div>`;

            root.innerHTML = headerHtml + tableHtml + pointsCardHtml;
        }

        // ────────────────────────────────────────────────────────────────────
        // TOURNAMENT BRACKET MODE
        // ────────────────────────────────────────────────────────────────────

        async function loadTournament(tournamentId) {
            const [{ data: tournament, error: tErr }, { data: brackets, error: bErr }] = await Promise.all([
                window.supabaseClient.from('tournaments').select('*').eq('id', tournamentId).single(),
                window.supabaseClient
                    .from('tournament_brackets')
                    .select('*, player1:player1_id(username,is_anonymous), player2:player2_id(username,is_anonymous), winner:winner_id(username)')
                    .eq('tournament_id', tournamentId)
                    .order('round')
                    .order('match_number')
            ]);

            if (tErr || !tournament) {
                showError('Tournament not found.');
                return;
            }

            const joined = tournament.players_joined || 0;
            const maxPlayers = tournament.max_players || 0;
            const isFilling = (tournament.status || '').toLowerCase() === 'filling';
            const prizePool = tournament.prize_pool || null;
            const tournamentType = (tournament.type || tournament.tournament_type || 'weekly').toUpperCase();

            document.title = `${tournament.name} | OcheVault`;

            // ── Header ───────────────────────────────────────────────────────
            let headerHtml = `
                <div style="animation:floatUp 0.45s cubic-bezier(0.22,1,0.36,1) both;">
                    <a href="javascript:history.back()" class="inline-flex items-center gap-2 text-slate-500 hover:text-white text-sm font-medium transition-colors mb-8 group">
                        <svg class="w-4 h-4 group-hover:-translate-x-0.5 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
                        Back to Tournaments
                    </a>

                    <div class="flex flex-wrap items-center gap-3 mb-3">
                        <span class="pill" style="background:rgba(99,102,241,0.12);color:#818cf8;border:1px solid rgba(99,102,241,0.3);">${tournamentType}</span>
                        <span class="tier-badge ${tierClass(tournament.tier)}">${tournament.tier || 'Bronze'}</span>
                        ${statusPill(tournament.status)}
                    </div>

                    <h1 class="display text-white text-4xl sm:text-5xl mb-6">${tournament.name}</h1>

                    <div class="info-card mb-4">
                        <div class="flex items-center gap-2 mb-3">
                            <svg class="w-4 h-4 text-slate-500 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0"/></svg>
                            <span class="text-xs text-slate-400 font-semibold uppercase tracking-wider">Entry Progress</span>
                        </div>
                        ${progressBar(joined, maxPlayers)}
                    </div>

                    ${prizePool ? `
                    <div class="prize-box mb-8 flex items-start gap-4">
                        <div class="w-10 h-10 rounded-xl bg-accent/10 border border-accent/25 flex items-center justify-center flex-shrink-0">
                            <svg class="w-5 h-5 text-accent" fill="currentColor" viewBox="0 0 20 20"><path d="M5 3a1 1 0 000 2h1.22l.305 1.222a5.995 5.995 0 003.472 8.342l-.305.834H9a1 1 0 000 2h2a1 1 0 000-2h-.197l.305-.834a5.994 5.994 0 003.472-8.342L14.78 5H16a1 1 0 100-2H5zM8 11a4 4 0 116.472-4.685A4 4 0 018 11z"/></svg>
                        </div>
                        <div>
                            <p class="text-xs text-slate-500 font-semibold uppercase tracking-wider mb-1">Prize Pool</p>
                            <p class="text-white font-bold text-base">${typeof prizePool === 'object' ? JSON.stringify(prizePool) : prizePool}</p>
                            <p class="text-[11px] text-slate-500 mt-0.5">Winner takes the prize</p>
                        </div>
                    </div>` : '<div class="mb-8"></div>'}
                </div>`;

            // ── Bracket or waiting screen ────────────────────────────────────
            let bracketHtml = '';

            if (!brackets || brackets.length === 0 || isFilling) {
                bracketHtml = await renderWaitingScreen(tournamentId, joined, maxPlayers, isFilling);
            } else {
                bracketHtml = renderBracket(brackets, tournament);
            }

            // ── Scoring info card ────────────────────────────────────────────
            const infoHtml = `
                <div class="info-card mt-8" style="animation:floatUp 0.45s 0.15s cubic-bezier(0.22,1,0.36,1) both;">
                    <h3 class="display text-white text-xl mb-4">How Tournament Scoring Works</h3>
                    <div class="space-y-3">
                        <div class="flex items-start gap-3 bg-dark/40 rounded-xl p-4 border border-white/5">
                            <div class="w-8 h-8 rounded-lg bg-brand/15 border border-brand/25 flex items-center justify-center flex-shrink-0">
                                <svg class="w-4 h-4 text-brand" fill="currentColor" viewBox="0 0 20 20"><path d="M10 18a8 8 0 100-16 8 8 0 000 16zM9.555 7.168A1 1 0 008 8v4a1 1 0 001.555.832l3-2a1 1 0 000-1.664l-3-2z"/></svg>
                            </div>
                            <div>
                                <p class="text-white text-sm font-bold mb-0.5">Round Format</p>
                                <p class="text-slate-500 text-xs">Each round: both players submit their best Triple Twenty score within the round window. Highest score advances.</p>
                            </div>
                        </div>
                        <div class="flex items-start gap-3 bg-dark/40 rounded-xl p-4 border border-white/5">
                            <div class="w-8 h-8 rounded-lg bg-accent/15 border border-accent/25 flex items-center justify-center flex-shrink-0">
                                <svg class="w-4 h-4 text-accent" fill="currentColor" viewBox="0 0 20 20"><path d="M9 2a1 1 0 000 2h2a1 1 0 100-2H9z"/><path fill-rule="evenodd" d="M4 5a2 2 0 012-2 3 3 0 003 3h2a3 3 0 003-3 2 2 0 012 2v11a2 2 0 01-2 2H6a2 2 0 01-2-2V5zm3 4a1 1 0 000 2h.01a1 1 0 100-2H7zm3 0a1 1 0 000 2h3a1 1 0 100-2h-3zm-3 4a1 1 0 100 2h.01a1 1 0 100-2H7zm3 0a1 1 0 100 2h3a1 1 0 100-2h-3z" clip-rule="evenodd"/></svg>
                            </div>
                            <div>
                                <p class="text-white text-sm font-bold mb-0.5">Score Submission</p>
                                <p class="text-slate-500 text-xs">Scores are submitted via the dashboard during your active round window. The system records your highest score automatically.</p>
                            </div>
                        </div>
                        <div class="flex items-start gap-3 bg-dark/40 rounded-xl p-4 border border-white/5">
                            <div class="w-8 h-8 rounded-lg bg-success/15 border border-success/25 flex items-center justify-center flex-shrink-0">
                                <svg class="w-4 h-4 text-success" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                            </div>
                            <div>
                                <p class="text-white text-sm font-bold mb-0.5">Round Window</p>
                                <p class="text-slate-500 text-xs">Each match has a deadline shown on the bracket. Miss the window and you forfeit the match.</p>
                            </div>
                        </div>
                    </div>
                </div>`;

            root.innerHTML = headerHtml + bracketHtml + infoHtml;
        }

        // ── Waiting screen ───────────────────────────────────────────────────

        async function renderWaitingScreen(tournamentId, joined, maxPlayers, isFilling) {
            const { data: entryRows } = await window.supabaseClient
                .from('tournament_entries')
                .select('*, profiles(username, is_anonymous)')
                .eq('tournament_id', tournamentId)
                .limit(32);

            const pct = maxPlayers > 0 ? Math.min(100, Math.round((joined / maxPlayers) * 100)) : 0;

            let playerListHtml = '';
            if (entryRows && entryRows.length > 0) {
                playerListHtml = `
                    <div class="mt-8 text-left max-w-md mx-auto">
                        <h3 class="display text-white text-lg mb-3">Players Joined (${entryRows.length})</h3>
                        <div class="space-y-2">
                            ${entryRows.map((e, i) => {
                                const name = displayName(e.profiles);
                                const isYou = e.user_id === currentUserId;
                                return `<div class="player-entry" style="animation:floatUp 0.3s ${i * 0.04}s cubic-bezier(0.22,1,0.36,1) both;">
                                    ${avatarInitial(name, 32)}
                                    <span class="text-white text-sm font-medium flex-1">${name}</span>
                                    ${isYou ? '<span class="text-[9px] bg-brand/20 text-brand font-bold px-1.5 py-0.5 rounded-md uppercase tracking-wider">YOU</span>' : ''}
                                </div>`;
                            }).join('')}
                        </div>
                    </div>`;
            }

            return `
                <div class="info-card" style="animation:floatUp 0.45s 0.08s cubic-bezier(0.22,1,0.36,1) both;">
                    <div class="waiting-screen">
                        <!-- Dartboard SVG -->
                        <div class="mx-auto mb-6" style="width:100px;height:100px;opacity:0.5;">
                            <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                                <circle cx="50" cy="50" r="48" fill="#dc2626" stroke="#0c1220" stroke-width="2"/>
                                <circle cx="50" cy="50" r="40" fill="#0c1220" stroke="#0c1220" stroke-width="1"/>
                                <circle cx="50" cy="50" r="32" fill="#dc2626" stroke="#0c1220" stroke-width="1"/>
                                <circle cx="50" cy="50" r="24" fill="#0c1220" stroke="#0c1220" stroke-width="1"/>
                                <circle cx="50" cy="50" r="16" fill="#dc2626" stroke="#0c1220" stroke-width="1"/>
                                <circle cx="50" cy="50" r="8" fill="#0c1220" stroke="#0c1220" stroke-width="1"/>
                                <circle cx="50" cy="50" r="4" fill="#f59e0b"/>
                            </svg>
                        </div>
                        <h2 class="display text-white text-3xl mb-2">Bracket Not Yet Generated</h2>
                        <p class="text-slate-400 text-sm mb-6 max-w-sm mx-auto">Bracket generates automatically when the tournament fills. Stand by!</p>

                        <div class="max-w-xs mx-auto mb-2">
                            <div class="progress-track">
                                <div class="progress-fill" style="width:${pct}%"></div>
                            </div>
                        </div>
                        <p class="text-slate-500 text-xs font-medium">${joined} / ${maxPlayers} players joined</p>
                    </div>
                    ${playerListHtml}
                </div>`;
        }

        // ── Bracket renderer ─────────────────────────────────────────────────

        function roundLabel(round, maxRound) {
            const remaining = maxRound - round + 1;
            if (remaining === 1) return 'Final';
            if (remaining === 2) return 'Semi-Final';
            if (remaining === 3) return 'Quarter-Final';
            const players = Math.pow(2, remaining);
            return `Round of ${players}`;
        }

        function renderBracket(brackets, tournament) {
            // Group by round
            const rounds = {};
            let maxRound = 0;
            brackets.forEach(b => {
                if (!rounds[b.round]) rounds[b.round] = [];
                rounds[b.round].push(b);
                if (b.round > maxRound) maxRound = b.round;
            });

            const sortedRounds = Object.keys(rounds).map(Number).sort((a, b) => a - b);

            // Find overall bracket winner
            const finalRoundMatches = rounds[maxRound] || [];
            const bracketWinner = finalRoundMatches.find(m => m.winner)?.winner || null;

            let winnerBannerHtml = '';
            if (bracketWinner) {
                winnerBannerHtml = `
                    <div class="winner-banner mb-8" style="animation:floatUp 0.45s 0.05s cubic-bezier(0.22,1,0.36,1) both;">
                        <div class="text-4xl mb-2">🏆</div>
                        <p class="text-xs text-accent font-bold uppercase tracking-widest mb-1">Tournament Champion</p>
                        <p class="display text-white text-3xl">${bracketWinner.username || 'Unknown'}</p>
                    </div>`;
            }

            // Build round columns
            const roundCols = sortedRounds.map((round, ri) => {
                const matches = rounds[round];
                const label = roundLabel(round, maxRound);

                const matchCards = matches.map((match, mi) => {
                    const p1Name = displayName(match.player1) || 'TBD';
                    const p2Name = displayName(match.player2) || 'TBD';
                    const hasWinner = !!match.winner_id;
                    const p1Wins = hasWinner && match.winner_id === match.player1_id;
                    const p2Wins = hasWinner && match.winner_id === match.player2_id;
                    const p1IsYou = match.player1_id === currentUserId;
                    const p2IsYou = match.player2_id === currentUserId;

                    let deadlineHtml = '';
                    if (match.round_ends_at && !hasWinner) {
                        const endsAt = new Date(match.round_ends_at);
                        const now = new Date();
                        const diffMs = endsAt - now;
                        if (diffMs > 0) {
                            const hrs = Math.floor(diffMs / 3600000);
                            const mins = Math.floor((diffMs % 3600000) / 60000);
                            deadlineHtml = `<div style="font-size:0.62rem;color:#64748b;padding:4px 12px 6px;border-top:1px solid rgba(255,255,255,0.04);">⏱ ${hrs}h ${mins}m remaining</div>`;
                        } else {
                            deadlineHtml = `<div style="font-size:0.62rem;color:#64748b;padding:4px 12px 6px;border-top:1px solid rgba(255,255,255,0.04);">Round closed</div>`;
                        }
                    }

                    return `<div class="match-wrapper" style="flex:1;display:flex;align-items:center;justify-content:center;padding:8px 0;">
                        <div class="match-card" style="animation:floatUp 0.35s ${ri * 0.08 + mi * 0.05}s cubic-bezier(0.22,1,0.36,1) both;">
                            <div class="match-player ${hasWinner ? (p1Wins ? 'winner' : 'loser') : ''}">
                                ${avatarInitial(p1Name, 22)}
                                <span class="match-player-name">${p1Name}${p1IsYou ? ' <span style="font-size:0.6rem;color:#dc2626;font-weight:800;">(YOU)</span>' : ''}</span>
                                ${match.score1 != null ? `<span class="match-score ${p1Wins ? 'winner-score' : ''}">${match.score1}</span>` : ''}
                            </div>
                            <div class="match-player ${hasWinner ? (p2Wins ? 'winner' : 'loser') : ''}">
                                ${avatarInitial(p2Name, 22)}
                                <span class="match-player-name">${p2Name}${p2IsYou ? ' <span style="font-size:0.6rem;color:#dc2626;font-weight:800;">(YOU)</span>' : ''}</span>
                                ${match.score2 != null ? `<span class="match-score ${p2Wins ? 'winner-score' : ''}">${match.score2}</span>` : ''}
                            </div>
                            ${deadlineHtml}
                        </div>
                    </div>`;
                }).join('');

                return `<div class="bracket-round" style="min-width:230px;">
                    <div class="round-label">${label}</div>
                    <div style="display:flex;flex-direction:column;flex:1;">
                        ${matchCards}
                    </div>
                </div>`;
            });

            // Build connector SVG lines between rounds
            let roundsWithConnectors = '';
            roundCols.forEach((col, i) => {
                roundsWithConnectors += col;
                if (i < roundCols.length - 1) {
                    roundsWithConnectors += `<div style="width:40px;flex-shrink:0;display:flex;align-items:center;justify-content:center;">
                        <div style="width:100%;height:1px;background:rgba(255,255,255,0.08);"></div>
                    </div>`;
                }
            });

            return `
                <div style="animation:floatUp 0.45s 0.08s cubic-bezier(0.22,1,0.36,1) both;">
                    ${winnerBannerHtml}
                    <h2 class="display text-white text-2xl mb-4">Tournament Bracket</h2>
                    <div class="bracket-container">
                        <div class="bracket-rounds" style="align-items:flex-start;padding:8px 0 16px;">
                            ${roundsWithConnectors}
                        </div>
                    </div>
                </div>`;
        }

        // ── Boot ─────────────────────────────────────────────────────────────

        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', () => setTimeout(init, 150));
        } else {
            setTimeout(init, 150);
        }

    })();
    </script>

</body>
</html>
