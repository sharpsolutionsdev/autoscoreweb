    <script>!function(){var h=localStorage.getItem('dv-theme-hex')||'#CC0B20';var s=document.documentElement.style;var r=parseInt(h.slice(1,3),16),g=parseInt(h.slice(3,5),16),b=parseInt(h.slice(5,7),16);s.setProperty('--brand',h);s.setProperty('--brand-r',r);s.setProperty('--brand-g',g);s.setProperty('--brand-b',b);s.setProperty('--brand-rgb',r+','+g+','+b);var L=function(c){return Math.min(255,c+Math.round((255-c)*.12))};var lr=L(r),lg=L(g),lb=L(b);s.setProperty('--brand-light','#'+[lr,lg,lb].map(function(c){return c.toString(16).padStart(2,'0')}).join(''))}()</script>

    <style>
        *, *::before, *::after { box-sizing: border-box; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #08080A; color: #F0F0F5; }
        .display { font-family: 'Barlow Condensed', sans-serif; font-weight: 900; font-style: italic; text-transform: uppercase; }

        @keyframes checkPop {
            0%   { transform: scale(0) rotate(-10deg); opacity: 0; }
            60%  { transform: scale(1.15) rotate(2deg); }
            100% { transform: scale(1) rotate(0); opacity: 1; }
        }
        .check-pop { animation: checkPop 0.6s cubic-bezier(0.34,1.56,0.64,1) 0.2s both; }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(20px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        .fade-up   { animation: fadeUp 0.6s 0.55s ease-out both; }
        .fade-up-2 { animation: fadeUp 0.6s 0.7s ease-out both; }

        @keyframes confettiDot {
            0%   { opacity: 0; transform: translateY(0) scale(0); }
            50%  { opacity: 1; transform: translateY(-22px) scale(1); }
            100% { opacity: 0; transform: translateY(-44px) scale(0.5); }
        }

        .btn-brand {
            background: var(--brand);
            transition: all 0.25s;
            position: relative; overflow: hidden;
        }
        .btn-brand::after {
            content: ''; position: absolute; inset: 0;
            background: linear-gradient(135deg, rgba(255,255,255,0.12) 0%, transparent 50%);
            opacity: 0; transition: opacity 0.25s;
        }
        .btn-brand:hover::after { opacity: 1; }
        .btn-brand:hover {
            background: var(--brand-light);
            box-shadow: 0 0 36px rgba(var(--brand-rgb), 0.4), 0 4px 16px rgba(var(--brand-rgb), 0.2);
            transform: translateY(-2px);
        }

        .noise::after {
            content: '';
            position: fixed; inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
            opacity: 0.018; pointer-events: none; z-index: 100;
        }

        .footer-col-head {
            font-size: 10px; font-weight: 700; letter-spacing: .15em;
            text-transform: uppercase; color: #4A4A5A; margin-bottom: 14px;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col noise">

    <!-- Auto-redirect to dashboard after 4s + sync subscription -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        // Confetti particles (decorative)
        const confetti = [];
        for (let i = 0; i < 25; i++) {
            const el = document.createElement('div');
            el.style.cssText = `
                position: fixed; left: 50%; top: -10px; 
                width: 8px; height: 8px; background: var(--brand); border-radius: 50%;
                pointer-events: none; z-index: 9999;
                animation: confettiDot 1.5s ${0.05 + i * 0.04}s ease-out forwards;
            `;
            document.body.appendChild(el);
            confetti.push(el);
        }
        
        // Sync Stripe subscription — poll DB until the webhook lands (or up to ~12s),
        // fall back to the sync-stripe-subscription function if needed, then redirect.
        (async function() {
            const SUPABASE_URL = 'https://poyjykgqsvgimssbhsuz.supabase.co';
            const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBveWp5a2dxc3ZnaW1zc2Joc3V6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM4MjgyMzQsImV4cCI6MjA4OTQwNDIzNH0.1_KBIagUj_EkfTU2MF3qsyR1lvJQ4jVqZ2AuVcGDBIA';
            const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
            let redirected = false;
            const redirect = () => {
                if (redirected) return;
                redirected = true;
                try { sessionStorage.setItem('dv-just-subscribed', '1'); } catch (_) {}
                const isApk = sessionStorage.getItem('dv_apk_login') === '1';
                window.location.href = isApk ? '/apk-gate' : '/dartvoice-dashboard?checkout=success';
            };

            try {
                const { data: { session }, error: sessErr } = await sb.auth.getSession();
                if (sessErr || !session?.access_token) {
                    setTimeout(redirect, 3500);
                    return;
                }
                const userId = session.user.id;

                // Kick off a Stripe-side sync in parallel so we're not purely
                // dependent on the webhook landing in time.
                fetch(SUPABASE_URL + '/functions/v1/sync-stripe-subscription', {
                    method: 'POST',
                    headers: {
                        'Authorization': 'Bearer ' + session.access_token,
                        'Content-Type': 'application/json',
                        'apikey': SUPABASE_KEY,
                    },
                    body: '{}',
                }).catch(e => console.warn('sync call failed:', e));

                // Poll dartvoice_subscriptions up to 12 attempts × 1s = 12s.
                for (let i = 0; i < 12; i++) {
                    await new Promise(r => setTimeout(r, 1000));
                    const { data: sub } = await sb
                        .from('dartvoice_subscriptions')
                        .select('status')
                        .eq('user_id', userId)
                        .maybeSingle();
                    if (sub && ['active', 'trialing'].includes(sub.status)) {
                        // Small pause so the celebration animation is visible.
                        setTimeout(redirect, 600);
                        return;
                    }
                }
                // Fallback: redirect anyway — dashboard will try one more sync.
                redirect();
            } catch (e) {
                console.warn('thanks sync failed:', e);
                setTimeout(redirect, 3500);
            }
        })();
    </script>
    <!-- DartVoice discount + welcome modules (auto-load) -->

    <script src="/dv-welcome.js" defer></script>
