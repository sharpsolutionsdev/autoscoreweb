    <script>
    (function() {

        var SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBveWp5a2dxc3ZnaW1zc2Joc3V6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM4MjgyMzQsImV4cCI6MjA4OTQwNDIzNH0.1_KBIagUj_EkfTU2MF3qsyR1lvJQ4jVqZ2AuVcGDBIA';
        var sb = supabase.createClient(SB_URL, SB_KEY);

        function esc(s) { var d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

        sb.auth.getSession().then(function(res) {
            var session = res.data && res.data.session;
            if (!session || !session.user) return;
            var user = session.user;
            var email = user.email || '';

            sb.from('dartvoice_subscriptions')
              .select('status')
              .eq('user_id', user.id)
              .maybeSingle()
              .then(function(subRes) {
                  var subStatus = (subRes.data && subRes.data.status) || null;
                  var hasActive = subStatus === 'active' || subStatus === 'trialing';

                  var ctaHref = hasActive ? 'dartvoice-dashboard' : 'login?intent=subscribe';
                  var ctaText = hasActive ? 'Dashboard' : 'Start Free Trial';
                  var ctaBtn  = hasActive
                      ? 'btn-outline px-4 py-2 rounded-lg text-sm font-semibold text-chalk'
                      : 'btn-brand px-4 py-2 rounded-lg text-sm font-semibold text-white';

                  var desktopEl = document.getElementById('nav-auth-desktop');
                  if (desktopEl) {
                      desktopEl.innerHTML =
                          '<span class="text-xs text-muted truncate max-w-[160px]">' + esc(email) + '</span>' +
                          '<a href="' + ctaHref + '" class="' + ctaBtn + '">' + ctaText + '</a>' +
                          '<button onclick="dvSignOut()" class="text-xs text-muted hover:text-chalk transition px-2 py-1.5 rounded-lg hover:bg-wire/30">Sign Out</button>';
                  }

                  var mobileEl = document.getElementById('nav-auth-mobile');
                  if (mobileEl) {
                      mobileEl.innerHTML =
                          '<p class="text-xs text-muted truncate px-2 mb-2">' + esc(email) + '</p>' +
                          '<div class="grid grid-cols-2 gap-2">' +
                              '<a href="' + ctaHref + '" class="' + ctaBtn + ' text-center">' + ctaText + '</a>' +
                              '<button onclick="dvSignOut()" class="btn-outline px-3 py-2.5 rounded-lg text-sm font-semibold text-center text-chalk">Sign Out</button>' +
                          '</div>';
                  }
              });
        });

        window.dvSignOut = function() {
            sb.auth.signOut().then(function() { window.location.reload(); });
        };
    })();
