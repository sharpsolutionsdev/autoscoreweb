name: Seed Supabase Storage from GitHub Releases

# One-click migration helper: pulls the latest published Windows installer,
# Android APK, and (optional) Chrome-extension zip from the public GitHub
# Releases of THIS repo, then uploads them to the public Supabase Storage
# `releases` bucket. Re-runnable; uses x-upsert: true.

on:
  workflow_dispatch:

jobs:
  seed:
    name: Pull & re-upload binaries
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repo (for the extension zip)
        uses: actions/checkout@v4

      - name: Mirror to Supabase Storage
        env:
          SUPABASE_URL: https://poyjykgqsvgimssbhsuz.supabase.co
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          set -uo pipefail

          if [ -z "${SUPABASE_SERVICE_ROLE_KEY:-}" ]; then
            echo "::error::Repo secret SUPABASE_SERVICE_ROLE_KEY is not set."
            echo "Add it at: https://github.com/sharpsolutionsdev/autoscoreweb/settings/secrets/actions"
            exit 1
          fi

          # Trim incidental whitespace/newlines that sneak in when copy-pasting
          # a JWT into the GitHub secrets box.
          SUPABASE_SERVICE_ROLE_KEY="$(printf '%s' "$SUPABASE_SERVICE_ROLE_KEY" | tr -d '[:space:]')"
          KEY_LEN=${#SUPABASE_SERVICE_ROLE_KEY}
          KEY_HEAD="${SUPABASE_SERVICE_ROLE_KEY:0:8}"
          KEY_TAIL="${SUPABASE_SERVICE_ROLE_KEY: -8}"
          echo "Service role key length: $KEY_LEN  prefix=$KEY_HEAD…  suffix=…$KEY_TAIL"
          if [ "$KEY_LEN" -lt 100 ]; then
            echo "::error::Service role key looks too short ($KEY_LEN chars). Did you paste the anon/publishable key by mistake?"
            exit 1
          fi
          if ! echo "$SUPABASE_SERVICE_ROLE_KEY" | grep -q '^eyJ'; then
            echo "::error::Service role key doesn't start with 'eyJ' — looks like it isn't a JWT."
            exit 1
          fi

          # 1) Probe Storage authorization with a no-op (HEAD against a known
          #    object that doesn't exist — we expect 404, not 401/403).
          echo ""
          echo "→ Probing Supabase Storage auth…"
          probe_status=$(curl -s -o /tmp/probe.body -w "%{http_code}" \
            -H "Authorization: Bearer $SUPABASE_SERVICE_ROLE_KEY" \
            -H "apikey: $SUPABASE_SERVICE_ROLE_KEY" \
            "$SUPABASE_URL/storage/v1/object/releases/__probe_does_not_exist")
          echo "auth probe HTTP $probe_status"
          if [ "$probe_status" = "401" ] || [ "$probe_status" = "403" ]; then
            echo "::error::Storage rejected the key ($probe_status). Use the SERVICE_ROLE key from"
            echo "https://supabase.com/dashboard/project/poyjykgqsvgimssbhsuz/settings/api"
            cat /tmp/probe.body
            exit 1
          fi

          tmp=$(mktemp -d)

          fetch () {
            local url="$1"; local out="$2"
            echo ""
            echo "→ Fetching $url"
            local code
            code=$(curl -sSL -o "$out" -w "%{http_code}" "$url")
            echo "  HTTP $code  size=$(stat -c%s "$out" 2>/dev/null || wc -c < "$out") bytes"
            if [ "$code" != "200" ]; then
              echo "::error::download failed ($code) for $url"
              return 1
            fi
            return 0
          }

          upload () {
            local path="$1"; local name="$2"; local mime="$3"
            echo ""
            echo "→ Uploading $name ($mime, $(stat -c%s "$path" 2>/dev/null || wc -c < "$path") bytes)…"
            local body=/tmp/upload.body
            local code
            code=$(curl -s -o "$body" -w "%{http_code}" -X POST \
              -H "Authorization: Bearer $SUPABASE_SERVICE_ROLE_KEY" \
              -H "apikey: $SUPABASE_SERVICE_ROLE_KEY" \
              -H "Content-Type: $mime" \
              -H "x-upsert: true" \
              --data-binary @"$path" \
              "$SUPABASE_URL/storage/v1/object/releases/$name")
            echo "  HTTP $code"
            cat "$body"
            echo ""
            if [ "$code" != "200" ] && [ "$code" != "201" ]; then
              echo "::error::upload failed for $name (HTTP $code)"
              return 1
            fi
          }

          fetch "https://github.com/sharpsolutionsdev/autoscoreweb/releases/latest/download/DartVoice.apk"        "$tmp/DartVoice.apk"        || apk_failed=1
          fetch "https://github.com/sharpsolutionsdev/autoscoreweb/releases/download/windows-latest/DartVoice_Setup.exe" "$tmp/DartVoice_Setup.exe"  || exe_failed=1

          had_failure=0
          if [ -z "${apk_failed:-}" ] && [ -s "$tmp/DartVoice.apk" ]; then
            upload "$tmp/DartVoice.apk" "DartVoice.apk" "application/vnd.android.package-archive" || had_failure=1
          fi
          if [ -z "${exe_failed:-}" ] && [ -s "$tmp/DartVoice_Setup.exe" ]; then
            upload "$tmp/DartVoice_Setup.exe" "DartVoice_Setup.exe" "application/vnd.microsoft.portable-executable" || had_failure=1
          fi
          if [ -f downloads/dartvoice-extension.zip ]; then
            upload "downloads/dartvoice-extension.zip" "dartvoice-extension.zip" "application/zip" || had_failure=1
          fi

          if [ "$had_failure" = "1" ]; then
            echo "::error::At least one upload failed — see logs above."
            exit 1
          fi

          echo ""
          echo "Done. Public URLs:"
          echo "  $SUPABASE_URL/storage/v1/object/public/releases/DartVoice.apk"
          echo "  $SUPABASE_URL/storage/v1/object/public/releases/DartVoice_Setup.exe"
          echo "  $SUPABASE_URL/storage/v1/object/public/releases/dartvoice-extension.zip"

      - name: Verify URLs are live
        run: |
          for f in DartVoice.apk DartVoice_Setup.exe dartvoice-extension.zip; do
            url="https://poyjykgqsvgimssbhsuz.supabase.co/storage/v1/object/public/releases/$f"
            code=$(curl -s -o /dev/null -w "%{http_code}" "$url")
            echo "$f -> HTTP $code"
          done
