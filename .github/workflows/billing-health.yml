name: Billing System Health Check

on:
  # Run every 6 hours to catch outages early
  schedule:
    - cron: '0 */6 * * *'

  # Run on every push that touches billing code
  push:
    paths:
      - 'autoscore/billing_server/**'
      - 'autoscore/billing.py'
      - '.github/workflows/billing-health.yml'

  # Allow manual trigger from the GitHub Actions UI
  workflow_dispatch:

jobs:
  # ── 1. Unit tests (no secrets needed) ────────────────────────────────────
  unit-tests:
    name: Billing Server Unit Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: autoscore/billing_server

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: autoscore/billing_server/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt pytest

      - name: Run unit tests
        run: python -m pytest test_app.py -v
        env:
          # Placeholder values so app.py imports without error
          STRIPE_SECRET_KEY: sk_test_placeholder
          STRIPE_WEBHOOK_SECRET: whsec_placeholder
          STRIPE_PRICE_ID: price_placeholder
          SUPABASE_URL: https://test.supabase.co
          SUPABASE_SERVICE_KEY: service_placeholder

  # ── 2. Live health-check against production billing server ───────────────
  live-health:
    name: Live Billing Server Health Check
    runs-on: ubuntu-latest
    permissions: {}
    # Only run if the secret is configured; skip silently on forks/PRs
    if: vars.DV_BILLING_URL != ''

    steps:
      - name: Ping /health endpoint
        run: |
          BILLING_URL="${{ vars.DV_BILLING_URL }}"
          echo "Checking ${BILLING_URL}/health …"

          RESPONSE=$(curl -sf --max-time 15 "${BILLING_URL}/health" || echo '{"ok":false,"checks":{"curl":"failed"}}')
          echo "Response: ${RESPONSE}"

          OK=$(echo "${RESPONSE}" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('ok','false'))" 2>/dev/null || echo "false")

          if [ "$(echo "${OK}" | tr '[:upper:]' '[:lower:]')" != "true" ]; then
            echo "::error::Billing server health check FAILED. Response: ${RESPONSE}"
            exit 1
          fi

          echo "✅ Billing server is healthy."
