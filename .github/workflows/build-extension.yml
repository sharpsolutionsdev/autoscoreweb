name: Package Chrome Extension

on:
  push:
    branches: [ main ]
    paths:
      - 'chrome_extension/**'
      - '.github/workflows/build-extension.yml'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  package:
    name: Zip & commit extension
    runs-on: ubuntu-latest
    permissions:
      contents: write
    timeout-minutes: 10

    steps:

      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Package extension
        run: |
          cd chrome_extension
          zip -j ../downloads/dartvoice-extension.zip \
            content.js icon128.png icon16.png icon48.png \
            manifest.json popup.html popup.js rules.json
          echo "Packaged $(ls -lh ../downloads/dartvoice-extension.zip | awk '{print $5}') zip"

      - name: Commit updated zip
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add downloads/dartvoice-extension.zip
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: rebuild chrome extension zip [skip ci]"
            git push
          fi
