name: Package Chrome Extension

on:
  push:
    branches: [ main ]
    paths:
      - 'chrome_extension/**'
      - '.github/workflows/build-extension.yml'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  package:
    name: Zip & commit extension
    runs-on: ubuntu-latest
    permissions:
      contents: write
    timeout-minutes: 10

    steps:

      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Package extension
        run: |
          cd chrome_extension
          zip -j ../downloads/dartvoice-extension.zip \
            content.js icon128.png icon16.png icon48.png \
            manifest.json popup.html popup.js rules.json
          echo "Packaged $(ls -lh ../downloads/dartvoice-extension.zip | awk '{print $5}') zip"

      - name: Publish to Cloudflare R2
        env:
          CF_API_TOKEN:  ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ACCOUNT_ID: 0585d1caa30b50424399443d3fc46628
          R2_BUCKET:     dartvoice-releases
        run: |
          if [ -z "$CF_API_TOKEN" ]; then
            echo "CLOUDFLARE_API_TOKEN secret not set — skipping R2 upload."
            exit 0
          fi
          curl --fail-with-body -X PUT \
            "https://api.cloudflare.com/client/v4/accounts/${CF_ACCOUNT_ID}/r2/buckets/${R2_BUCKET}/objects/dartvoice-extension.zip" \
            -H "Authorization: Bearer $CF_API_TOKEN" \
            -H "Content-Type: application/zip" \
            --data-binary @downloads/dartvoice-extension.zip

      - name: Commit updated zip
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add downloads/dartvoice-extension.zip
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: rebuild chrome extension zip [skip ci]"
            git push
          fi
