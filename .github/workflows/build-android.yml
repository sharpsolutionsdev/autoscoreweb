name: Build Android APK

on:
  push:
    branches: [ main ]
    paths:
      - 'autoscore/dartvoice_android.py'
      - 'autoscore/buildozer.spec'
      - 'autoscore/billing.py'
      - 'autoscore/service/main.py'
      - 'autoscore/gen_icon.py'
      - 'autoscore/vosk-model-small-en-us/**'
      - '.github/workflows/build-android.yml'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build APK (arm64)
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    timeout-minutes: 90

    steps:

      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            git zip unzip wget \
            openjdk-17-jdk \
            python3-pip python3-venv python3-setuptools \
            libffi-dev libssl-dev \
            autoconf libtool pkg-config \
            zlib1g-dev cmake build-essential \
            libncurses-dev libltdl-dev lld

      - name: Install buildozer + Cython
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install buildozer "Cython<3.0"

      - name: Cache buildozer global dir
        uses: actions/cache@v4
        with:
          path: ~/.buildozer
          key: buildozer-${{ runner.os }}-${{ hashFiles('autoscore/buildozer.spec') }}
          restore-keys: buildozer-${{ runner.os }}-

      - name: Cache .gradle
        uses: actions/cache@v4
        with:
          path: ~/.gradle
          key: gradle-${{ runner.os }}

      - name: Generate app icon
        working-directory: autoscore
        run: |
          python3 -m pip install Pillow
          python3 gen_icon.py

      - name: Verify Vosk model bundled
        working-directory: autoscore
        run: |
          test -f vosk-model-small-en-us/am/final.mdl \
            || { echo "ERROR: Vosk model not found — check repo LFS or submodule"; exit 1; }
          echo "Vosk model OK ($(find vosk-model-small-en-us -type f | wc -l) files)"

      - name: Build debug APK
        working-directory: autoscore
        env:
          JAVA_HOME: /usr/lib/jvm/java-17-openjdk-amd64
        run: |
          set -o pipefail
          buildozer android debug 2>&1 | tee build.log || true
          echo ""
          echo "====== LAST 100 LINES OF BUILD LOG ======"
          tail -100 build.log
          echo "========================================="
          # Fail the step if no APK was produced
          ls bin/*.apk 2>/dev/null || { echo "ERROR: no APK in bin/ — build failed"; exit 1; }

      # Always upload the build log so failures can be diagnosed
      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: autoscore/build.log
          retention-days: 7

      - name: Rename APK for stable URL
        run: mv autoscore/bin/*.apk autoscore/bin/DartVoice.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: DartVoice-debug-apk
          path: autoscore/bin/DartVoice.apk
          retention-days: 30

      # Public permanent URL:
      # https://github.com/sharpsolutionsdev/autoscoreweb/releases/latest/download/DartVoice.apk
      - name: Publish to GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          tag_name: android-latest
          name: "DartVoice Android (latest)"
          body: |
            Latest DartVoice Android build — auto-published by CI.

            **Install steps:**
            1. Tap `DartVoice.apk` below to download on your Android device
            2. Settings → Security → enable **Install from unknown sources**
            3. Open the downloaded file and tap **Install**
          files: autoscore/bin/DartVoice.apk
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
