<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <title>Payment Cancelled | OcheVault</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config={theme:{extend:{colors:{brand:'#dc2626',dark:'#0c1220'}}}}
    </script>
    <style>body{font-family:'Plus Jakarta Sans',sans-serif;}</style>
</head>
<body class="bg-dark text-white min-h-screen flex items-center justify-center p-6">
    <div class="text-center max-w-xs">
        <div class="w-20 h-20 mx-auto mb-6 rounded-full bg-slate-800 border-2 border-slate-700 flex items-center justify-center">
            <svg class="w-10 h-10 text-slate-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
        </div>
        <h1 class="text-2xl font-black text-white mb-2" style="font-family:'Barlow Condensed',sans-serif;">Payment Cancelled</h1>
        <p class="text-slate-400 text-sm mb-6">No worries — nothing was charged. This window will close automatically.</p>
        <p class="text-slate-600 text-xs">If it doesn't close, you can safely close it yourself.</p>
    </div>
    <script>
        setTimeout(()=>{ try{window.close();}catch(e){} }, 2000);
    </script>
</body>
</html>
