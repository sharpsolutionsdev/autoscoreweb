<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <title>404 — Page Not Found | DartVoice</title>
    <meta name="robots" content="noindex">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:ital,wght@0,400;0,600;0,700;0,900;1,700;1,900&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        display: ['"Barlow Condensed"', 'sans-serif'],
                        sans:    ['"Plus Jakarta Sans"', 'sans-serif'],
                    },
                    colors: {
                        brand: '#CC0B20',
                        dark:  '#08080A',
                        card:  '#111114',
                        wire:  '#252530',
                        muted: '#6E6E82',
                        chalk: '#F0F0F5',
                    }
                }
            }
        }
    </script>
    <style>
        *, *::before, *::after { box-sizing: border-box; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #08080A; color: #F0F0F5; }
        .display { font-family: 'Barlow Condensed', sans-serif; font-weight: 900; font-style: italic; letter-spacing: -0.02em; text-transform: uppercase; }
        .neon-score { text-shadow: 0 0 12px rgba(204,11,32,0.9), 0 0 24px rgba(204,11,32,0.5), 0 0 48px rgba(204,11,32,0.2); }

<body class="min-h-screen flex flex-col items-center justify-center px-5 text-center">

    <!-- Logo -->
    <a href="/" class="flex items-center gap-2.5 mb-12 group">

            <circle cx="18" cy="18" r="11" stroke="rgba(255,255,255,0.2)" stroke-width="1.5" fill="none"/>

    <div class="flex flex-col sm:flex-row gap-3">
        <a href="/" class="px-6 py-3 rounded-xl text-sm font-semibold text-white" style="background:#CC0B20;">

        <a href="dartvoice-dashboard.html" class="px-6 py-3 rounded-xl text-sm font-semibold text-chalk border border-white/10 hover:border-white/25 transition">
