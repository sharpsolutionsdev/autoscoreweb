<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>DartVoice</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:ital,wght@0,400;0,600;0,700;0,900;1,700;1,900&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap');

    body {
      width: 260px;
      padding: 20px;
      margin: 0;
      font-family: 'Plus Jakarta Sans', sans-serif;
      background-color: #08080A;
      color: #F0F0F5;
      position: relative;
      overflow: hidden;
    }
    
    /* Subtle Red Ambient Glow behind layout */
    body::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(circle at 50% 0%, rgba(204,11,32,0.15) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
    }

    .brand-container {
      position: relative;
      z-index: 10;
      text-align: center;
      margin-bottom: 16px;
    }

    h2 {
      margin: 0;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 24px;
      font-weight: 900;
      font-style: italic;
      letter-spacing: -0.02em;
      text-transform: uppercase;
      color: white;
    }
    
    .text-red { color: #CC0B20; }

    p {
      font-size: 11px;
      color: #6E6E82;
      margin: 4px 0 24px 0;
      line-height: 1.4;
      font-weight: 500;
    }

    /* Primary glowing button */
    button {
      background-color: #CC0B20;
      color: white;
      border: none;
      padding: 12px 16px;
      font-size: 12px;
      font-family: 'Plus Jakarta Sans', sans-serif;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 800;
      width: 100%;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      box-shadow: 0 0 15px rgba(204,11,32,0.3);
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
      position: relative;
      z-index: 10;
    }
    
    button:hover {
      background-color: #e60d24;
      box-shadow: 0 0 25px rgba(204,11,32,0.5), 0 4px 10px rgba(0,0,0,0.5);
      transform: translateY(-1px);
    }
    
    button:active {
      transform: translateY(1px);
      box-shadow: 0 0 10px rgba(204,11,32,0.3);
    }
  </style>
</head>
<body>
  <div class="brand-container">
    <h2>DART<span class="text-red">VOICE</span></h2>
    <p>Overlay voice control on the current web scorer.</p>
  </div>
  <button id="injectBtn">LAUNCH OVERLAY</button>
  <script src="popup.js"></script>
</body>
</html>
