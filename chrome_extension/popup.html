<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>DartVoice</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:ital,wght@0,400;0,600;0,700;0,900;1,700;1,900&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap');
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 320px;
      font-family: 'Plus Jakarta Sans', sans-serif;
      background: #08080A;
      color: #F0F0F5;
      position: relative;
      overflow-x: hidden;
    }
    body::before {
      content: '';
      position: absolute; top: -40%; left: -40%; width: 180%; height: 180%;
      background: radial-gradient(circle at 50% 0%, rgba(204,11,32,0.12) 0%, transparent 55%);
      pointer-events: none; z-index: 0;
    }

    .content { position: relative; z-index: 1; padding: 20px; }

    /* ── Header ── */
    .brand {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 16px; padding-bottom: 14px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    .brand h1 {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 20px; font-weight: 900; font-style: italic;
      letter-spacing: -0.02em; text-transform: uppercase; color: white;
    }
    .brand .version {
      font-size: 9px; color: #4A4A5A; font-weight: 600;
      letter-spacing: 0.1em; text-transform: uppercase;
    }
    .red { color: #CC0B20; }

    /* ── Account card ── */
    .account {
      background: #111114; border: 1px solid rgba(255,255,255,0.05);
      border-radius: 12px; padding: 14px; margin-bottom: 14px;
    }
    .account-signed-in {
      display: flex; align-items: center; justify-content: space-between;
    }
    .account-email {
      font-size: 12px; font-weight: 600; color: #F0F0F5;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 180px;
    }
    .account-sub {
      font-size: 10px; font-weight: 700; letter-spacing: 0.05em;
      text-transform: uppercase; margin-top: 3px;
    }
    .sub-active { color: #22c55e; }
    .sub-trial  { color: #eab308; }
    .sub-none   { color: #6E6E82; }
    .sign-out-link {
      font-size: 10px; color: #6E6E82; cursor: pointer; text-decoration: underline;
      background: none; border: none; font-family: inherit;
    }
    .sign-out-link:hover { color: #F0F0F5; }

    /* ── Demo timer ── */
    .demo-section { margin-bottom: 14px; }
    .demo-label {
      font-size: 10px; font-weight: 700; letter-spacing: 0.1em;
      text-transform: uppercase; color: #6E6E82; margin-bottom: 6px;
    }
    .demo-bar-track {
      width: 100%; height: 6px; background: rgba(255,255,255,0.06);
      border-radius: 3px; overflow: hidden; margin-bottom: 4px;
    }
    .demo-bar-fill {
      height: 100%; background: linear-gradient(90deg, #CC0B20, #e60d24);
      border-radius: 3px; transition: width 0.3s;
    }
    .demo-bar-fill.expired { background: #6E6E82; }
    .demo-time { font-size: 11px; color: #aaabbb; font-weight: 500; }
    .demo-time b { color: #F0F0F5; }

    /* ── Settings ── */
    .setting { margin-bottom: 14px; }
    .setting-label {
      font-size: 10px; font-weight: 700; letter-spacing: 0.1em;
      text-transform: uppercase; color: #6E6E82; margin-bottom: 6px;
    }
    select {
      width: 100%; background: #111114; color: #F0F0F5;
      border: 1px solid rgba(255,255,255,0.07); border-radius: 8px;
      padding: 9px 12px; font-size: 12px;
      font-family: 'Plus Jakarta Sans', sans-serif;
      outline: none; cursor: pointer;
      appearance: none; -webkit-appearance: none;
      background-image: url("data:image/svg+xml,%3Csvg width='10' height='6' viewBox='0 0 10 6' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1L5 5L9 1' stroke='%236E6E82' stroke-width='1.5' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E");
      background-repeat: no-repeat; background-position: right 12px center;
    }
    select:focus { border-color: #CC0B20; box-shadow: 0 0 0 2px rgba(204,11,32,0.1); }

    /* ── Buttons ── */
    .btn {
      width: 100%; border: none; border-radius: 10px;
      padding: 13px 16px; font-size: 12px;
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-weight: 800; text-transform: uppercase; letter-spacing: 0.06em;
      cursor: pointer; transition: all 0.2s;
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .btn-primary {
      background: #CC0B20; color: white;
      box-shadow: 0 0 20px rgba(204,11,32,0.3);
    }
    .btn-primary:hover {
      background: #e60d24; box-shadow: 0 0 30px rgba(204,11,32,0.5);
      transform: translateY(-1px);
    }
    .btn-primary:active { transform: translateY(1px); }
    .btn-primary:disabled {
      opacity: 0.4; cursor: not-allowed;
      transform: none !important; box-shadow: none !important;
    }
    .btn-secondary {
      background: rgba(37,37,48,0.5); color: #F0F0F5;
      border: 1px solid rgba(255,255,255,0.06);
    }
    .btn-secondary:hover { background: rgba(37,37,48,0.8); }

    /* ── Lockout ── */
    .lockout { text-align: center; padding: 20px 10px; }
    .lockout-icon { font-size: 36px; margin-bottom: 10px; }
    .lockout h2 {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 22px; font-weight: 900; font-style: italic;
      text-transform: uppercase; margin-bottom: 8px;
    }
    .lockout p {
      font-size: 12px; color: #6E6E82; line-height: 1.5; margin-bottom: 16px;
    }

    /* ── Footer ── */
    .footer {
      display: flex; justify-content: space-between; align-items: center;
      padding-top: 10px; border-top: 1px solid rgba(255,255,255,0.06); margin-top: 14px;
    }
    .footer a {
      font-size: 10px; color: #6E6E82; text-decoration: none;
      font-family: inherit; cursor: pointer;
    }
    .footer a:hover { color: #CC0B20; }

    .hidden { display: none !important; }
  </style>
</head>
<body>
  <div class="content">
    <div class="brand">
      <h1>DART<span class="red">VOICE</span></h1>
      <span class="version">v2.0 · Launchpad</span>
    </div>

    <!-- ── Normal view ── -->
    <div id="view-normal">

      <!-- Account -->
      <div class="account">
        <div id="acct-signed-out">
          <p style="font-size:11px; color:#6E6E82; margin-bottom:10px;">Sign in to unlock unlimited use</p>
          <button class="btn btn-secondary" id="btn-sign-in" style="margin-bottom:0;">Sign In to DartVoice</button>
        </div>
        <div id="acct-signed-in" class="hidden">
          <div class="account-signed-in">
            <div>
              <div class="account-email" id="acct-email"></div>
              <div class="account-sub" id="acct-sub"></div>
            </div>
            <button class="sign-out-link" id="btn-sign-out">Sign out</button>
          </div>
        </div>
      </div>

      <!-- Demo timer -->
      <div class="demo-section" id="demo-section">
        <div class="demo-label">Demo Time</div>
        <div class="demo-bar-track">
          <div class="demo-bar-fill" id="demo-fill" style="width:0%"></div>
        </div>
        <div class="demo-time"><b id="demo-remaining">10:00</b> remaining</div>
      </div>

      <!-- Mic selector -->
      <div class="setting">
        <div class="setting-label">Microphone</div>
        <select id="mic-select">
          <option value="">Loading devices…</option>
        </select>
      </div>

      <!-- Launch button -->
      <button class="btn btn-primary" id="btn-launch">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"/></svg>
        Launch Overlay
      </button>
    </div>

    <!-- ── Lockout view ── -->
    <div id="view-lockout" class="hidden">
      <div class="lockout">
        <div class="lockout-icon">⏱</div>
        <h2>Demo Expired</h2>
        <p>Your 10-minute demo has ended.<br>Sign in &amp; subscribe to keep using DartVoice.</p>
        <button class="btn btn-primary" id="btn-lockout-signin" style="margin-bottom:10px;">Sign In →</button>
        <button class="btn btn-secondary" id="btn-lockout-plans">View Plans →</button>
      </div>
    </div>

    <!-- Footer -->
    <div class="footer">
      <a href="https://dartvoice.app" target="_blank">dartvoice.app</a>
      <a href="https://dartvoice.app/dartvoice-dashboard.html" target="_blank">Dashboard</a>
      <a href="https://dartvoice.app/guide.html" target="_blank">Guide</a>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
