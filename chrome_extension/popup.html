<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>DartVoice</title>
  <style>
    body {
      width: 250px;
      padding: 16px;
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: #08080A;
      color: #F0F0F5;
      text-align: center;
    }
    h2 {
      margin-top: 0;
      font-size: 18px;
    }
    p {
      font-size: 13px;
      color: #aaabbb;
      margin-bottom: 20px;
    }
    button {
      background-color: #CC0B20;
      color: white;
      border: none;
      padding: 10px 16px;
      font-size: 14px;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
      width: 100%;
      transition: background-color 0.2s;
    }
    button:hover {
      background-color: #e01030;
    }
  </style>
</head>
<body>
  <h2>DartVoice</h2>
  <p>Overlay voice control on the current web scorer.</p>
  <button id="injectBtn">Launch Overlay</button>
  <script src="popup.js"></script>
</body>
</html>
